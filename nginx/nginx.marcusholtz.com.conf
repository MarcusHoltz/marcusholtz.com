# ===============================================================
#  nginx.conf — marcusholtz.com
# ===============================================================


# ── Detect curl User-Agent ────────────────────────────────────────────────────
map $http_user_agent $is_curl {
    default  0;
    ~*curl   1;
}

# ── Block malicious query string patterns ─────────────────────────────────────
map $query_string $bad_query {
    default                              0;
    ~*(eval\()                           1;
    ~*(\.\.\/)                           1;
    ~*(localhost|loopback|127\.0\.0\.1)  1;
}


# ===============================================================
#  HTTP — redirect everything to HTTPS www
#  Exception: serve /card directly to curl
# ===============================================================
server {
    listen 80;
    server_name marcusholtz.com www.marcusholtz.com;
    root /usr/share/nginx/html;

    location = /card {
        if ($is_curl) {
            rewrite ^ /card break;
        }
        return 301 https://www.marcusholtz.com$request_uri;
    }

    location / {
        return 301 https://www.marcusholtz.com$request_uri;
    }
}


# ===============================================================
#  HTTPS non-www — redirect to www
#  Exception: serve /card directly to curl
# ===============================================================
server {
    listen 443 ssl;
    server_name marcusholtz.com;
    root /usr/share/nginx/html;

    ssl_certificate     /etc/ssl/certs/marcusholtz.com.crt;      # ← update path
    ssl_certificate_key /etc/ssl/private/marcusholtz.com.key;    # ← update path

    location = /card {
        if ($is_curl) {
            rewrite ^ /card break;
        }
        return 301 https://www.marcusholtz.com$request_uri;
    }

    location / {
        return 301 https://www.marcusholtz.com$request_uri;
    }
}


# ===============================================================
#  HTTPS www — main server
# ===============================================================
server {
    listen 443 ssl;
    server_name www.marcusholtz.com;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/ssl/certs/marcusholtz.com.crt;      # ← update path
    ssl_certificate_key /etc/ssl/private/marcusholtz.com.key;    # ← update path

    # ── Hide server info ──────────────────────────────────────────────────────
    server_tokens off;

    # ── Block malicious query strings ─────────────────────────────────────────
    if ($bad_query) { return 403; }

    # ── Block sensitive files ─────────────────────────────────────────────────
    location ~* (\.htaccess|\.htpasswd|\.env|\.git|\.DS_Store|composer\.(json|lock)|package\.json)$ {
        deny all;
    }

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https://api.web3forms.com; frame-ancestors 'none';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # ── /card — curl business card ────────────────────────────────────────────
    location = /card {
        add_header Content-Type "text/plain; charset=utf-8";
        try_files /card =404;
    }

    # ── Font caching ──────────────────────────────────────────────────────────
    # Astro hashes font filenames — safe to cache forever
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Hashed assets (JS/CSS bundles) ────────────────────────────────────────
    # Astro appends content hashes — safe to cache forever
    location ~* \.[0-9a-f]{8}\.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Images and icons ──────────────────────────────────────────────────────
    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── HTML pages ────────────────────────────────────────────────────────────
    # Astro static output: /about/ → /about/index.html
    # Never cache HTML so deploys take effect immediately
    location / {
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "no-cache";
    }

    # ── Custom error pages ────────────────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html { internal; }
}
